<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Space Grotesk', system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#0a0e14"/><stop offset="100%" stop-color="#0d1117"/></linearGradient>
    <filter id="g3"><feGaussianBlur stdDeviation="3" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="gr3" width="30" height="30" patternUnits="userSpaceOnUse"><path d="M30 0L0 0 0 30" fill="none" stroke="#1a2332" stroke-width=".5"/></pattern>
  </defs>
  <rect width="900" height="500" fill="url(#bg3)" rx="8"/>
  <rect width="900" height="500" fill="url(#gr3)" rx="8"/>
  <text x="450" y="38" text-anchor="middle" fill="#00ffff" font-size="14" font-weight="700" letter-spacing="3" filter="url(#g3)">TRADITIONAL API vs x402 + BROWSER HARNESS</text>
  <line x1="150" y1="50" x2="750" y2="50" stroke="#00ffff" stroke-width="1" opacity=".3"/>

  <!-- Headers -->
  <rect x="40" y="65" width="200" height="30" rx="3" fill="#1a2332"/>
  <text x="140" y="85" text-anchor="middle" fill="#667788" font-size="10" font-weight="600" letter-spacing="1">DIMENSION</text>
  <rect x="260" y="65" width="280" height="30" rx="3" fill="#331111"/>
  <text x="400" y="85" text-anchor="middle" fill="#ff6666" font-size="10" font-weight="600" letter-spacing="1">🔴 TRADITIONAL API</text>
  <rect x="560" y="65" width="300" height="30" rx="3" fill="#0d2222"/>
  <text x="710" y="85" text-anchor="middle" fill="#00ff88" font-size="10" font-weight="600" letter-spacing="1">🟢 x402 + HARNESS</text>

  <!-- Row helper: y starts at 105, each row 38px -->
  <!-- Row 1 -->
  <rect x="40" y="105" width="200" height="34" rx="2" fill="#111820"/><text x="140" y="126" text-anchor="middle" fill="#8899aa" font-size="10">Onboarding</text>
  <rect x="260" y="105" width="280" height="34" rx="2" fill="#111820"/><text x="400" y="126" text-anchor="middle" fill="#cc8888" font-size="10">Account + KYC</text>
  <rect x="560" y="105" width="300" height="34" rx="2" fill="#111820"/><text x="710" y="126" text-anchor="middle" fill="#88ddaa" font-size="10" font-weight="600">None required</text>
  <!-- Row 2 -->
  <rect x="40" y="143" width="200" height="34" rx="2" fill="#0d1117"/><text x="140" y="164" text-anchor="middle" fill="#8899aa" font-size="10">Auth method</text>
  <rect x="260" y="143" width="280" height="34" rx="2" fill="#0d1117"/><text x="400" y="164" text-anchor="middle" fill="#cc8888" font-size="10">API key (stored, rotated)</text>
  <rect x="560" y="143" width="300" height="34" rx="2" fill="#0d1117"/><text x="710" y="164" text-anchor="middle" fill="#88ddaa" font-size="10" font-weight="600">Signed USDC tx</text>
  <!-- Row 3 -->
  <rect x="40" y="181" width="200" height="34" rx="2" fill="#111820"/><text x="140" y="202" text-anchor="middle" fill="#8899aa" font-size="10">Payment setup</text>
  <rect x="260" y="181" width="280" height="34" rx="2" fill="#111820"/><text x="400" y="202" text-anchor="middle" fill="#cc8888" font-size="10">Credit card + billing</text>
  <rect x="560" y="181" width="300" height="34" rx="2" fill="#111820"/><text x="710" y="202" text-anchor="middle" fill="#88ddaa" font-size="10" font-weight="600">Crypto wallet only</text>
  <!-- Row 4 -->
  <rect x="40" y="219" width="200" height="34" rx="2" fill="#0d1117"/><text x="140" y="240" text-anchor="middle" fill="#8899aa" font-size="10">Settlement</text>
  <rect x="260" y="219" width="280" height="34" rx="2" fill="#0d1117"/><text x="400" y="240" text-anchor="middle" fill="#cc8888" font-size="10">2–7 days</text>
  <rect x="560" y="219" width="300" height="34" rx="2" fill="#0d1117"/><text x="710" y="240" text-anchor="middle" fill="#88ddaa" font-size="10" font-weight="600">~2 seconds</text>
  <!-- Row 5 -->
  <rect x="40" y="257" width="200" height="34" rx="2" fill="#111820"/><text x="140" y="278" text-anchor="middle" fill="#8899aa" font-size="10">Fees</text>
  <rect x="260" y="257" width="280" height="34" rx="2" fill="#111820"/><text x="400" y="278" text-anchor="middle" fill="#cc8888" font-size="10">2–3% + fixed</text>
  <rect x="560" y="257" width="300" height="34" rx="2" fill="#111820"/><text x="710" y="278" text-anchor="middle" fill="#88ddaa" font-size="10" font-weight="600">~$0.001 gas only</text>
  <!-- Row 6 -->
  <rect x="40" y="295" width="200" height="34" rx="2" fill="#0d1117"/><text x="140" y="316" text-anchor="middle" fill="#8899aa" font-size="10">Micropayments</text>
  <rect x="260" y="295" width="280" height="34" rx="2" fill="#0d1117"/><text x="400" y="316" text-anchor="middle" fill="#cc8888" font-size="10">Not feasible</text>
  <rect x="560" y="295" width="300" height="34" rx="2" fill="#0d1117"/><text x="710" y="316" text-anchor="middle" fill="#88ddaa" font-size="10" font-weight="600">Native ($0.0001+)</text>
  <!-- Row 7 -->
  <rect x="40" y="333" width="200" height="34" rx="2" fill="#111820"/><text x="140" y="354" text-anchor="middle" fill="#8899aa" font-size="10">Agent-to-agent</text>
  <rect x="260" y="333" width="280" height="34" rx="2" fill="#111820"/><text x="400" y="354" text-anchor="middle" fill="#cc8888" font-size="10">Not possible</text>
  <rect x="560" y="333" width="300" height="34" rx="2" fill="#111820"/><text x="710" y="354" text-anchor="middle" fill="#88ddaa" font-size="10" font-weight="600">Built-in</text>
  <!-- Row 8 -->
  <rect x="40" y="371" width="200" height="34" rx="2" fill="#0d1117"/><text x="140" y="392" text-anchor="middle" fill="#8899aa" font-size="10">Human required</text>
  <rect x="260" y="371" width="280" height="34" rx="2" fill="#0d1117"/><text x="400" y="392" text-anchor="middle" fill="#cc8888" font-size="10">Yes (onboarding)</text>
  <rect x="560" y="371" width="300" height="34" rx="2" fill="#0d1117"/><text x="710" y="392" text-anchor="middle" fill="#88ddaa" font-size="10" font-weight="600">Optional</text>
  <!-- Row 9 -->
  <rect x="40" y="409" width="200" height="34" rx="2" fill="#111820"/><text x="140" y="430" text-anchor="middle" fill="#8899aa" font-size="10">Works with browser</text>
  <rect x="260" y="409" width="280" height="34" rx="2" fill="#111820"/><text x="400" y="430" text-anchor="middle" fill="#cc8888" font-size="10">Only if site has API</text>
  <rect x="560" y="409" width="300" height="34" rx="2" fill="#111820"/><text x="710" y="430" text-anchor="middle" fill="#88ddaa" font-size="10" font-weight="600">Any website</text>

  <!-- Bottom summary -->
  <rect x="40" y="455" width="820" height="30" rx="4" fill="#0d2222" stroke="#00ff88" stroke-width=".5"/>
  <text x="450" y="475" text-anchor="middle" fill="#00ff88" font-size="11" font-weight="600">x402 eliminates every friction point that blocks autonomous AI agents</text>
</svg>
